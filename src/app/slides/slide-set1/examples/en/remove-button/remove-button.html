<div class="buttons">
  <button (click)="addCats()">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="24"
         height="24"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round"
         class="lucide lucide-plus-icon lucide-plus"
         aria-hidden="true">
      <path d="M5 12h14"></path>
      <path d="M12 5v14"></path>
    </svg>
    <span>Add cats</span>
  </button>

  <button (click)="reset()">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="24"
         height="24"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round"
         class="lucide lucide-x-icon lucide-x"
         aria-hidden="true">
      <path d="M18 6 6 18"></path>
      <path d="m6 6 12 12"></path>
    </svg>
    <span>Remove all cats</span>
  </button>
</div>


<div class="emoji-container">

  @for (ceva of [].constructor(catsCounter()); let i = $index; track i) {
  <span class="cat">😺</span>
  }
  @empty {
  <span id="empty-state">No cats.</span>
  }

</div>
