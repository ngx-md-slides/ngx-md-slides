<div class="skip-links sr-only">
  <a [routerLink]="currentRoute"
     fragment="present">{{'ui.skipToPresent' | translate}}</a>
  <a [routerLink]="currentRoute"
     fragment="menu-title">{{'ui.skipToNavigation' | translate}}</a>
  <a [routerLink]="currentRoute"
     fragment="slides-start">{{'ui.skipToSlides' | translate}}</a>
</div>

<div class="disclaimer"><strong>{{'ui.disclaimerTitle' | translate}}:</strong>{{'ui.disclaimerBody' | translate}}</div>

<header header></header>

<div class="main-container">
  <main>
    <router-outlet></router-outlet>
    <p class="credit">
      {{'ui.creditsBy' | translate}}
      <a href="https://chiosa.dev">Teodora Chiosa<span class="sr-only">({{'ui.external' | translate}})</span></a>.
    </p>
  </main>
</div>
